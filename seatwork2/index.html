<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Grade 10 Castmates</title>

<style>

body {
    background: linear-gradient(135deg, #fff3e0, #ffe082);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.card {
    border: none;
    border-radius: 18px;
    background: #fffdf7;
    box-shadow: 0 8px 20px rgba(255, 167, 38, 0.2);
    transition: all 0.25s ease;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 28px rgba(255, 152, 0, 0.25);
}

h2 {
    color: #ef6c00;
}

.text-muted {
    color: #fb8c00 !important;
}

.form-control {
    border-radius: 12px;
    border: 1px solid #ffcc80;
    padding: 10px;
    background: #fffaf3;
    transition: all 0.2s ease;
}

.form-control:focus {
    border-color: #ffa726;
    box-shadow: 0 0 8px rgba(255, 167, 38, 0.4);
}

.btn-primary {
    background: linear-gradient(135deg, #ffb74d, #fb8c00);
    border: none;
    border-radius: 12px;
    font-weight: 600;
    color: #fff;
}

.btn-primary:hover {
    background: linear-gradient(135deg, #fb8c00, #ef6c00);
}

.btn-success {
    background: linear-gradient(135deg, #ffd54f, #ffa726);
    border: none;
    border-radius: 12px;
    font-weight: 600;
    color: #5d4037;
}

.btn-success:hover {
    background: linear-gradient(135deg, #ffca28, #fb8c00);
    color: #fff;
}

.list-group-item {
    border-radius: 12px;
    margin-bottom: 8px;
    border: none;
    background: #fff8e1;
    transition: all 0.2s ease;
}

.list-group-item:hover {
    background: #ffe0b2;
    transform: scale(1.02);
}

h5 {
    color: #ef6c00;
}

.container {
    animation: popIn 0.5s ease;
}

@keyframes popIn {
    from {
        opacity: 0;
        transform: scale(0.95);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}
</style>

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="text-center mb-4">
        <h2 class="fw-bold">Madwoman MV Cast</h2>
        <p class="text-muted">Add and manage your castmates</p>
    </div>

    <div class="card shadow p-4">
        <input type="text" id="name" class="form-control mb-3" placeholder="Castmate name">
        <input type="text" id="section" class="form-control mb-3" placeholder="Role">
        <input type="text" id="subject" class="form-control mb-3" placeholder="Job">

        <div class="d-flex gap-2">
            <button py-click="add_classmate" class="btn btn-primary w-50">Add</button>
            <button py-click="show_classmates" class="btn btn-success w-50">Show</button>
        </div>
    </div>

    <div class="card shadow mt-4 p-3">
        <h5 class="fw-bold">Castmate List</h5>
        <ul id="output" class="list-group mt-2"></ul>
    </div>

</div>

<py-script src="main.py"></py-script>

</body>
</html>
